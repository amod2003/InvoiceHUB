services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - MONGODB_URL=mongodb://mongo:27017
    depends_on:
      - mongo

volumes:
  mongo_data:
